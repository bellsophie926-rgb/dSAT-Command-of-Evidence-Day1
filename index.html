    &lt;style&gt;
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #d97706;
            --background: #f8fafc;
            --foreground: #0f172a;
            --success: #16a34a;
            --danger: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Merriweather', serif; }

        /* Bluebook-style UI */
        .header {
            background-color: white;
            border-bottom: 2px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .timer {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.25rem;
            color: var(--primary);
            background: #e0f2fe;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
        }

        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 0 2rem;
            min-height: 70vh;
        }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .pane {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 2rem;
            overflow-y: auto;
            max-height: 80vh;
        }

        .question-text {
            font-size: 1.125rem;
            line-height: 1.75;
            margin-bottom: 1.5rem;
        }

        .option {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .option:hover:not(.disabled) {
            border-color: var(--secondary);
            background: #eff6ff;
        }

        .option.selected {
            border-color: var(--primary);
            background: #dbeafe;
        }

        .option.correct {
            border-color: var(--success);
            background: #f0fdf4;
        }

        .option.wrong {
            border-color: var(--danger);
            background: #fef2f2;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 0.5rem;
            display: none;
        }

        .feedback.active { display: block; }
        .feedback.correct-bg { background: #f0fdf4; border-left: 4px solid var(--success); }
        .feedback.wrong-bg { background: #fef2f2; border-left: 4px solid var(--danger); }

        .footer-nav {
            background: white;
            border-top: 2px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1e40af; }
        .btn-secondary { background: #e2e8f0; color: var(--foreground); }
        
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        /* Teacher Portal Table */
        .tp-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        .tp-table th, .tp-table td {
            border: 1px solid #e2e8f0;
            padding: 0.75rem;
            text-align: left;
        }
        .tp-table th { background: #f8fafc; }

        .hidden { display: none !important; }
    &lt;/style&gt;

    &lt;script&gt;
        const questions = [
            {
                id: 1,
                level: &quot;Easy&quot;,
                text: &quot;Botanist Dr. Reed is studying the Heliconia plant in the dense Amazonian understory. Most plants in this light-poor environment have large green leaves to maximize photosynthesis. However, Dr. Reed hypothesizes that the Heliconia developed &lt;b&gt;bright red bracts&lt;/b&gt; (modified leaves) not for photosynthesis, but specifically to &lt;b&gt;attract hummingbirds for pollination&lt;/b&gt; in the visually dim forest.&quot;,
                prompt: &quot;Which finding, if true, would most directly support Dr. Reed's hypothesis?&quot;,
                options: [
                    &quot;(A) The red bracts of the Heliconia contain chemical compounds that are toxic to common leaf-eating insects.&quot;,
                    &quot;(B) Hummingbirds in the Amazonian understory rely primarily on their vision and are highly attracted to red pigments.&quot;,
                    &quot;(C) Heliconia plants grown in greenhouses with abundant sunlight produce bracts that are slightly more orange than red.&quot;,
                    &quot;(D) Several other plant species in the Amazonian canopy also utilize birds for pollination.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: Red bracts = attract hummingbirds. (B) directly proves the connection (hummingbirds rely on vision and like red). (A) is an Irrelevant Variable (mentions insects/toxicity). (C) is a Deceptive Half-Truth (discusses color but ignores the birds).&quot;
            },
            {
                id: 2,
                level: &quot;Easy&quot;,
                text: &quot;The city council of Oakhaven proposed converting a major car lane on Main Street into a &lt;b&gt;protected bicycle lane&lt;/b&gt;. The council hypothesized that creating a safer physical barrier for cyclists would &lt;b&gt;significantly increase the number of daily bicycle commuters&lt;/b&gt; traveling to the downtown business district.&quot;,
                prompt: &quot;Which data point from a study conducted one year after the bike lane's construction would most directly weaken the council's hypothesis?&quot;,
                options: [
                    &quot;(A) A survey showing that 80% of current bicycle commuters feel safer using the new protected lane.&quot;,
                    &quot;(B) Traffic data indicating that car congestion on Main Street increased by 15% during morning rush hours.&quot;,
                    &quot;(C) City records demonstrating that the average daily number of bicycle commuters on Main Street decreased by 5%.&quot;,
                    &quot;(D) Retail data revealing that sales of bicycles at local Oakhaven shops rose by 10% over the past year.&quot;
                ],
                answer: 2,
                exp: &quot;Claim: Protected lane = increase bicycle commuters. (Task: Weaken) (C) directly contradicts the claim (the number decreased). (A) is Irrelevant Emotion (feeling safer doesn't equal more commuters). (B) is an Irrelevant Variable. (D) is Too Broad (sales &ne; daily commuters).&quot;
            },
            {
                id: 3,
                level: &quot;Medium&quot;,
                text: &quot;Archaeologists excavating a Bronze Age settlement in Turkey uncovered dozens of large, unglazed clay amphorae. Traditionally, scholars assumed these specific vessels were used exclusively for the &lt;b&gt;long-term storage of dry agricultural goods&lt;/b&gt;. However, a new team posits that these amphorae were actually utilized primarily for &lt;b&gt;fermenting and storing liquid wine&lt;/b&gt;.&quot;,
                prompt: &quot;Which finding, if true, would most directly weaken the new team's hypothesis?&quot;,
                options: [
                    &quot;(A) Isotope analysis of the amphorae's interior walls reveals microscopic residues of grain husks and absolutely no traces of tartaric acid, a chemical marker of wine.&quot;,
                    &quot;(B) Similar unglazed clay amphorae found in neighboring settlements were known to be used for storing both olive oil and wine.&quot;,
                    &quot;(C) Ancient texts from the same region describe complex, multi-stage processes for harvesting wheat and barley.&quot;,
                    &quot;(D) The clay used to make the amphorae is highly porous, meaning it would allow small amounts of liquid to slowly evaporate over time.&quot;
                ],
                answer: 0,
                exp: &quot;Claim: Amphorae = used for wine. (Task: Weaken) (A) destroys the claim by showing evidence of grain and NO evidence of wine. (D) is a Deceptive Half-Truth/Slight Support. (B) is Opposite of Text (supports the wine theory).&quot;
            },
            {
                id: 4,
                level: &quot;Medium&quot;,
                text: &quot;Marine biologists monitored the population of Silverfin fish in Lake Moraine. Ten years ago, an invasive species of algae was introduced. Biologist Elena Rostova hypothesizes that the &lt;b&gt;invasive algae&lt;/b&gt; caused the steep decline in the Silverfin population by &lt;b&gt;completely depleting the oxygen levels in the lake's deeper waters&lt;/b&gt;, where Silverfin typically lay their &lt;b&gt;eggs&lt;/b&gt;.&quot;,
                prompt: &quot;Which choice provides data that most directly supports Rostova&rsquo;s hypothesis?&quot;,
                options: [
                    &quot;(A) Water quality tests show oxygen levels in the lake's shallow waters remain stable, while Silverfin adult fish are increasingly found swimming near the surface.&quot;,
                    &quot;(B) Population tracking reveals that Silverfin numbers began declining two years before the invasive algae was first detected.&quot;,
                    &quot;(C) Measurements show that deep-water oxygen levels drop to near zero during the algae's blooming season, coinciding with a 90% failure rate for Silverfin eggs to hatch.&quot;,
                    &quot;(D) Data indicates that the population of the invasive algae has doubled every two years since its introduction.&quot;
                ],
                answer: 2,
                exp: &quot;Claim: Algae = no oxygen in deep water = Silverfin eggs die. (Task: Support) (C) provides the exact data matching the three steps of the claim. (A) is an Irrelevant Variable (talks about adults). (B) is Opposite/Weaken.&quot;
            },
            {
                id: 5,
                level: &quot;Medium&quot;,
                text: &quot;Literary critic Samuel Thorne argues that, unlike her early works, Elizabeth Barrett&rsquo;s later poems deliberately adopted a &lt;b&gt;chaotic, fragmented meter&lt;/b&gt;. Thorne hypothesizes that this shift was an intentional choice to &lt;b&gt;mirror the psychological fragmentation and anxiety&lt;/b&gt; brought about by rapid &lt;b&gt;industrialization&lt;/b&gt; in London.&quot;,
                prompt: &quot;Which finding, if true, would most directly support Thorne&rsquo;s hypothesis?&quot;,
                options: [
                    &quot;(A) Barrett's personal diaries from her later years frequently mention her struggles with chronic illness and physical pain.&quot;,
                    &quot;(B) A series of letters written by Barrett to her publisher explains that her new uneven rhythms were designed to capture the overwhelming noise and disruption of the modern factory city.&quot;,
                    &quot;(C) Several contemporary critics of Barrett wrote scathing reviews of her later poetry, calling her new fragmented style 'undisciplined'.&quot;,
                    &quot;(D) Sales records indicate that Barrett's classical early poems sold significantly more copies than her later, more fragmented collections.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: Fragmented meter = intentional choice to mirror industrial anxiety. (Task: Support) (B) directly confirms her intention via a primary source. (A) is an Irrelevant Variable (pain &ne; industrial anxiety). (C) is Irrelevant Opinion.&quot;
            },
            {
                id: 6,
                level: &quot;Medium&quot;,
                text: &quot;A software company implemented a 'No-Meeting Wednesdays' policy. The human resources director hypothesized that &lt;b&gt;eliminating internal meetings for one full day&lt;/b&gt; would reduce employee burnout and lead to a &lt;b&gt;significant increase in the total number of coding tasks completed&lt;/b&gt; by the engineering team each week.&quot;,
                prompt: &quot;Which choice provides data from a post-implementation review that most directly weakens the director's hypothesis?&quot;,
                options: [
                    &quot;(A) Surveys indicate that 85% of engineers reported feeling less stressed and more focused on Wednesdays.&quot;,
                    &quot;(B) Project management software tracks that while Wednesday productivity spiked, the total number of weekly completed coding tasks decreased by 12% due to miscommunication on other days.&quot;,
                    &quot;(C) The number of emails sent between employees on Wednesdays increased by 40% compared to the months before the policy.&quot;,
                    &quot;(D) Only 60% of the managers adhered strictly to the policy, occasionally scheduling short 'emergency' syncs.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: No-meeting Wednesday = increase TOTAL weekly tasks. (Task: Weaken) (B) acknowledges Wednesday was productive, but the total weekly tasks decreased, perfectly weakening the claim. (A) is Opposite/Support. (C) is an Irrelevant Variable.&quot;
            },
            {
                id: 7,
                level: &quot;Hard&quot;,
                text: &quot;Astrobiologists detected &lt;b&gt;dimethyl sulfide (DMS)&lt;/b&gt; on exoplanet K2-18b. On Earth, DMS is produced almost exclusively by &lt;b&gt;phytoplankton&lt;/b&gt;. The team hypothesizes that DMS on K2-18b is a &lt;b&gt;strong biosignature&lt;/b&gt;, indicating the existence of a biological marine ecosystem.&quot;,
                prompt: &quot;Which finding, if true, would most directly weaken the research team's hypothesis?&quot;,
                options: [
                    &quot;(A) Spectroscopic analysis confirms that K2-18b possesses a global liquid water ocean capable of supporting life.&quot;,
                    &quot;(B) Recent laboratory experiments demonstrate that extreme ultraviolet radiation interacting with hydrogen and carbon dioxide can synthesize large quantities of DMS abiotically.&quot;,
                    &quot;(C) The specific wavelength signature of the DMS found on K2-18b differs slightly from the signature of DMS produced by Earth's phytoplankton.&quot;,
                    &quot;(D) Other exoplanets with hydrogen-rich atmospheres similar to K2-18b have been found to lack entirely any trace of DMS.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: DMS = Biological marine ecosystem. (Task: Weaken) (B) proves DMS can be created 'abiotically' (without life) via radiation. This introduces a fatal alternative cause (他因), destroying the biosignature claim. (A) is Opposite/Support.&quot;
            },
            {
                id: 8,
                level: &quot;Hard&quot;,
                text: &quot;A national grocery chain moved fresh produce to the front and &lt;b&gt;processed snacks to the back&lt;/b&gt;. The CMO hypothesized that this layout change would &lt;b&gt;only alter the purchasing behavior of impulse buyers&lt;/b&gt;, while having &lt;b&gt;no effect on consumers with a pre-written shopping list&lt;/b&gt;.&quot;,
                prompt: &quot;Which data point from the chain's annual sales report most directly supports the CMO&rsquo;s hypothesis?&quot;,
                options: [
                    &quot;(A) Overall sales of fresh produce increased by 22%, while sales of processed snacks declined by 18% across all demographics.&quot;,
                    &quot;(B) Shoppers carrying physical or digital lists spent the same percentage of their budget on processed snacks as they did before, whereas shoppers without lists bought 35% less snacks.&quot;,
                    &quot;(C) Customer exit surveys revealed that 60% of shoppers felt the new layout made the store look more welcoming.&quot;,
                    &quot;(D) Shoppers with pre-written lists completed their shopping trips 15% faster than they did prior to the layout modifications.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: Layout change = alters impulse buyers ONLY, NO effect on list buyers. (Task: Support) (B) provides exact data proving both parts of the 'only/no effect' equation. (A) is Too Broad (ignores list vs no-list). (D) is an Irrelevant Variable.&quot;
            },
            {
                id: 9,
                level: &quot;Hard&quot;,
                text: &quot;Historian Dr. Lin investigates the 14th-century Venetian &lt;b&gt;'Florentine Gothic'&lt;/b&gt; style. She hypothesizes that the nobility adopted this highly &lt;b&gt;expensive, fragile style specifically as a political flex&lt;/b&gt; to signal their immense wealth and secure social dominance following economic instability.&quot;,
                prompt: &quot;Which finding, if true, would most directly support Dr. Lin&rsquo;s hypothesis?&quot;,
                options: [
                    &quot;(A) Florentine artists were highly sought after in Venice during the 14th century due to their mastery of complex stone carving.&quot;,
                    &quot;(B) City council decrees reveal that only families who could prove continuous wealth during the recent economic crisis were legally permitted to commission Florentine Gothic facades.&quot;,
                    &quot;(C) The fragile lacy stone carvings of the Florentine Gothic style required constant, expensive maintenance to prevent erosion.&quot;,
                    &quot;(D) Several Venetian palaces built in the traditional Romanesque style survived the economic instability without needing repairs.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: Gothic style = Political flex to show wealth after crisis. (Task: Support) (B) proves it was literally a legal status symbol tied to wealth. (C) is Deceptive (proves cost but doesn't prove political/social flex intention).&quot;
            },
            {
                id: 10,
                level: &quot;Hard&quot;,
                text: &quot;A university introduced a 'First-Year Mentorship' program. The university hypothesized that the mentorship program would be &lt;b&gt;equally effective across all academic disciplines&lt;/b&gt; in improving the freshman retention rate.&quot;,
                prompt: &quot;Which choice provides data that most directly weakens the administration's hypothesis?&quot;,
                options: [
                    &quot;(A) The overall freshman retention rate increased from 75% to 82% in the first year of the mentorship program.&quot;,
                    &quot;(B) Freshman retention in the Engineering department rose by 15%, while retention in the Humanities department dropped by 2% despite equal participation.&quot;,
                    &quot;(C) 90% of freshmen surveyed reported that their senior mentors provided valuable advice regarding time management.&quot;,
                    &quot;(D) The dropout rate for students who opted out of the mentorship program was significantly higher than for those who participated.&quot;
                ],
                answer: 1,
                exp: &quot;Claim: Mentorship = Equally effective across all disciplines. (Task: Weaken) (B) directly shatters the 'equally effective' part of the claim by showing a huge discrepancy between departments. (A) is Opposite/Support.&quot;
            }
        ];

        const app = {
            currentIndex: 0,
            timeLeft: 180,
            timerInterval: null,
            studentResults: [],
            score: 0,

            start() {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('question-screen').classList.remove('hidden');
                this.loadQuestion();
            },

            loadQuestion() {
                const q = questions[this.currentIndex];
                document.getElementById('q-progress').innerText = `Question ${this.currentIndex + 1} of ${questions.length}`;
                document.getElementById('level-badge').innerText = q.level.toUpperCase();
                document.getElementById('q-text').innerHTML = q.text;
                document.getElementById('q-prompt').innerText = q.prompt;
                
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';
                q.options.forEach((opt, idx) =&gt; {
                    const btn = document.createElement('button');
                    btn.className = 'option';
                    btn.innerText = opt;
                    btn.onclick = () =&gt; this.selectOption(idx);
                    optionsContainer.appendChild(btn);
                });

                document.getElementById('feedback').classList.remove('active');
                document.getElementById('next-btn').disabled = true;
                this.resetTimer();
            },

            resetTimer() {
                clearInterval(this.timerInterval);
                this.timeLeft = 180;
                this.updateTimerDisplay();
                this.timerInterval = setInterval(() =&gt; {
                    this.timeLeft--;
                    this.updateTimerDisplay();
                    if (this.timeLeft &lt;= 0) {
                        this.handleTimeout();
                    }
                }, 1000);
            },

            updateTimerDisplay() {
                const minutes = Math.floor(this.timeLeft / 60);
                const seconds = this.timeLeft % 60;
                document.getElementById('timer').innerText = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (this.timeLeft &lt; 30) {
                    document.getElementById('timer').style.color = 'var(--danger)';
                } else {
                    document.getElementById('timer').style.color = 'var(--primary)';
                }
            },

            selectOption(selectedIndex) {
                clearInterval(this.timerInterval);
                const q = questions[this.currentIndex];
                const isCorrect = selectedIndex === q.answer;
                
                if (isCorrect) this.score++;
                this.studentResults.push({
                    qId: q.id,
                    isCorrect: isCorrect,
                    time: 180 - this.timeLeft,
                    selected: String.fromCharCode(65 + selectedIndex)
                });

                // Update UI
                const btns = document.querySelectorAll('.option');
                btns.forEach((btn, idx) =&gt; {
                    btn.classList.add('disabled');
                    btn.onclick = null;
                    if (idx === q.answer) btn.classList.add('correct');
                    if (idx === selectedIndex &amp;&amp; !isCorrect) btn.classList.add('wrong');
                });

                const feedback = document.getElementById('feedback');
                feedback.classList.add('active');
                feedback.classList.toggle('correct-bg', isCorrect);
                feedback.classList.toggle('wrong-bg', !isCorrect);
                document.getElementById('feedback-title').innerText = isCorrect ? &quot;Correct!&quot; : &quot;Incorrect&quot;;
                document.getElementById('feedback-body').innerText = q.exp;
                
                document.getElementById('next-btn').disabled = false;
            },

            handleTimeout() {
                clearInterval(this.timerInterval);
                this.selectOption(-1); // Automatically marked as wrong
            },

            nextQuestion() {
                this.currentIndex++;
                if (this.currentIndex &lt; questions.length) {
                    this.loadQuestion();
                } else {
                    this.showResults();
                }
            },

            showResults() {
                document.getElementById('question-screen').classList.add('hidden');
                document.getElementById('result-screen').style.display = 'flex';
                document.getElementById('score-display').innerText = `${this.score}/${questions.length}`;
                
                const reportData = {
                    name: &quot;Student&quot;,
                    score: this.score,
                    details: this.studentResults
                };
                document.getElementById('report-code').value = btoa(JSON.stringify(reportData));
            },

            copyCode() {
                const codeEl = document.getElementById('report-code');
                codeEl.select();
                document.execCommand('copy');
                alert(&quot;Code copied!&quot;);
            },

            showTeacherPortal() {
                document.getElementById('teacher-portal').style.display = 'flex';
            },

            closeModals() {
                document.querySelectorAll('.modal').forEach(m =&gt; m.style.display = 'none');
            },

            analyzeCode() {
                const input = document.getElementById('tp-input').value;
                try {
                    const data = JSON.parse(atob(input));
                    const tbody = document.getElementById('tp-tbody');
                    tbody.innerHTML = '';
                    
                    data.details.forEach(res =&gt; {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            &lt;td&gt;${res.qId}&lt;/td&gt;
                            &lt;td class=&quot;${res.isCorrect ? 'text-success' : 'text-danger'} font-bold&quot;&gt;${res.isCorrect ? 'PASS' : 'FAIL'}&lt;/td&gt;
                            &lt;td&gt;${res.time}s&lt;/td&gt;
                            &lt;td&gt;${res.selected}&lt;/td&gt;
                        `;
                        tbody.appendChild(tr);
                    });
                    
                    document.getElementById('tp-result').classList.remove('hidden');
                } catch(e) {
                    alert(&quot;Invalid code!&quot;);
                }
            }
        };

        app.init = function() {
            // Initializing logic if needed
        };

        window.app = app;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

</script>
</body>

</html>
